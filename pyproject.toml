[tool.mypy]
python_version = "3.12"

# 1. Указываем, где искать пакеты
mypy_path = "src"

# 2. Эти флаги обязательны для работы с src-layout
explicit_package_bases = true
namespace_packages = true

# 3. Указываем конкретные цели проверки (пакеты внутри src)
packages = ["config", "core", "gui"]
# Модуль main.py в корне проекта
modules = ["main"]

# 4. ЯДЕРНЫЙ ФИКС: Запрещаем mypy автоматически сканировать папку src.
# Это уберет фантомный модуль "src.config" и оставит только "config".
exclude = ["^src/"]

# --- Твой уровень строгости (strict) ---
strict = true
ignore_missing_imports = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_configs = true

# Плагин Pydantic для твоих схем
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
